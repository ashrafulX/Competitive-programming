name: Update Problem Count

on:
  push:
    branches: [ main ]
    paths:
      - 'Competitive Programming/**.cpp'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count solved problems
        id: count
        run: |
          COUNT=$(find "Competitive Programming" -type f -name "*.cpp" | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Update badge in README
        run: |
          COUNT=${{ steps.count.outputs.count }}
          sed -i -E "s/(Problems%20Solved-)[0-9]+/\1$COUNT/" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update problem count [skip ci]"
          git push