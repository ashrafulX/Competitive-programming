name: Update Problem Count

on:
  push:
    branches:
      - main
    paths:
      - 'Competitive Programming/**/*.cpp'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Count cpp files
        id: count
        run: |
          # Count only .cpp files inside the specific folder
          COUNT=$(find "Competitive Programming" -type f -name "*.cpp" | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Update README badge
        run: |
          COUNT=${{ steps.count.outputs.count }}
          sed -i -E "s/Problems%20Solved-[0-9]+/Problems%20Solved-$COUNT/" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          
          # This ensures it only commits if the README was actually changed (i.e., count increased/decreased)
          if ! git diff --cached --quiet; then
            git commit -m "Update problem count to $COUNT"
            git push
          else
            echo "No changes in problem count. Skipping commit."
          fi